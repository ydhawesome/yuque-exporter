<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>语雀导出工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',system-ui,sans-serif;background:#f0f4f8;color:#1a202c;font-size:14px}
#app{display:flex;flex-direction:column;min-height:100vh}
.header{background:linear-gradient(135deg,#1a6ed8,#0f4fa0);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
.header .tag{background:rgba(255,255,255,.2);border-radius:4px;padding:2px 8px;font-size:12px}
.login-status{margin-left:auto;font-size:13px;opacity:.85}
.login-status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:#f6ad55}
.login-status.ok .dot{background:#68d391}
.content{flex:1;padding:24px;max-width:900px;margin:0 auto;width:100%}

/* ── SCREEN MANAGER ── */
.screen{display:none}
.screen.active{display:block}

/* ── LOGIN SCREEN ── */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:28px}
.card h2{font-size:16px;color:#2d3748;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e2e8f0}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:13px;color:#4a5568;margin-bottom:6px;font-weight:500}
.form-row input{width:100%;border:1px solid #cbd5e0;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;transition:border-color .2s}
.form-row input:focus{border-color:#1a6ed8;box-shadow:0 0 0 3px rgba(26,110,216,.1)}
.btn{border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#1a6ed8;color:#fff}
.btn-primary:hover{background:#1558b0}
.btn-primary:disabled{background:#a0aec0;cursor:not-allowed}
.btn-outline{background:#fff;color:#1a6ed8;border:1px solid #1a6ed8}
.btn-outline:hover{background:#ebf4ff}
.btn-danger{background:#e53e3e;color:#fff}
.btn-danger:hover{background:#c53030}
.btn-success{background:#38a169;color:#fff}
.btn-success:hover{background:#276749}
.error-msg{color:#e53e3e;font-size:13px;margin-top:8px;padding:8px 12px;background:#fff5f5;border-radius:6px;border-left:3px solid #e53e3e;display:none}

/* ── MAIN SCREEN ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.tab{flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-weight:500;color:#718096;transition:all .2s}
.tab.active{background:#1a6ed8;color:#fff;box-shadow:0 2px 6px rgba(26,110,216,.35)}
.tab-content{display:none}
.tab-content.active{display:block}
.section-title{font-size:13px;font-weight:600;color:#4a5568;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.dir-row{display:flex;gap:8px;align-items:center}
.dir-row .dir-path{flex:1;border:1px solid #cbd5e0;border-radius:8px;padding:9px 12px;color:#4a5568;background:#f7fafc;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tip{font-size:12px;color:#718096;margin-top:6px;line-height:1.6}

/* book list */
.book-list{max-height:260px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;background:#fafafa}
.book-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
.book-item:last-child{border-bottom:none}
.book-item:hover{background:#ebf4ff}
.book-item input[type=checkbox]{width:16px;height:16px;accent-color:#1a6ed8;flex-shrink:0}
.book-name{font-weight:500;flex:1}
.book-user{font-size:12px;color:#718096}
.book-actions{display:flex;gap:8px;margin-bottom:10px}
.book-loading{text-align:center;padding:24px;color:#718096}

/* ── PROGRESS SCREEN ── */
.progress-wrap{margin:20px 0}
.progress-bar-bg{background:#e2e8f0;border-radius:99px;height:12px;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,#1a6ed8,#38b2ac);height:100%;border-radius:99px;transition:width .4s ease;width:0%}
.progress-msg{font-size:13px;color:#4a5568;margin-top:10px;min-height:20px}
.progress-pct{font-size:32px;font-weight:700;color:#1a6ed8;text-align:center;margin:16px 0}
.log-box{background:#1a202c;color:#a0f0a0;font-family:'Consolas',monospace;font-size:12px;border-radius:8px;padding:14px;height:220px;overflow-y:auto;line-height:1.7}

/* ── DONE SCREEN ── */
.result-icon{text-align:center;font-size:48px;margin:12px 0}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.stat-box{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#1a6ed8}
.stat-label{font-size:12px;color:#718096;margin-top:4px}
.result-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}

/* ── REWARD 赞赏 ── */
.reward-link{margin-left:14px;font-size:13px;color:#fff;cursor:pointer;background:rgba(255,255,255,.18);padding:4px 12px;border-radius:6px;transition:all .2s;white-space:nowrap}
.reward-link:hover{background:rgba(255,255,255,.32)}
.reward-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.reward-mask.show{display:flex}
.reward-box{background:#fff;border-radius:16px;padding:26px 30px;text-align:center;max-width:330px;position:relative;box-shadow:0 12px 44px rgba(0,0,0,.3)}
.reward-box h3{font-size:17px;color:#2d3748;margin-bottom:4px}
.reward-box img{width:240px;height:auto;border-radius:8px;margin-top:10px}
.reward-box p{font-size:12.5px;color:#718096;margin-top:12px;line-height:1.6}
.reward-close{position:absolute;top:10px;right:14px;border:none;background:none;font-size:24px;color:#a0aec0;cursor:pointer;line-height:1}
.reward-close:hover{color:#4a5568}
.reward-done{display:inline-block;margin-top:14px;font-size:13px;color:#1a6ed8;background:#ebf4ff;padding:6px 14px;border-radius:6px;cursor:pointer;transition:background .2s}
.reward-done:hover{background:#dbeafe}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>语雀导出工具</h1>
    <span class="tag">v1.0</span>
    <div class="login-status" id="loginStatus">
      <span class="dot"></span><span id="loginName">未登录</span>
    </div>
    <span class="reward-link" id="rewardLink">☕ 赞赏</span>
  </div>
  <div class="content">

    <!-- ══ LOGIN SCREEN ══ -->
    <div class="screen active" id="screenLogin">
      <div class="card" style="max-width:420px;margin:40px auto">
        <h2>登录语雀账号</h2>
        <div class="form-row">
          <label>账号（邮箱 / 手机 / 语雀 ID）</label>
          <input type="text" id="inputUser" placeholder="请输入账号" autocomplete="username"/>
        </div>
        <div class="form-row">
          <label>密码</label>
          <input type="password" id="inputPass" placeholder="请输入密码" autocomplete="current-password"/>
        </div>
        <div class="error-msg" id="loginError"></div>
        <div style="margin-top:20px;display:flex;gap:10px">
          <button class="btn btn-primary" id="btnLogin" style="flex:1">登 录</button>
        </div>
        <p class="tip" style="margin-top:14px">密码仅在本机加密传输，不会被储存在程序中。登录 Cookie 有效期约 24 小时。</p>
      </div>
    </div>

    <!-- ══ MAIN SCREEN ══ -->
    <div class="screen" id="screenMain">
      <div class="tabs">
        <div class="tab active" data-tab="notes">📝 小记导出</div>
        <div class="tab" data-tab="books">📚 知识库导出</div>
      </div>

      <!-- 小记 tab -->
      <div class="tab-content active card" id="tabNotes">
        <div class="form-row">
          <p class="section-title">输出目录</p>
          <div class="dir-row">
            <div class="dir-path" id="notesDirLabel">（未选择）</div>
            <button class="btn btn-outline" id="btnSelectNotesDir">选择目录</button>
          </div>
          <p class="tip">导出内容：全部小记的 Markdown 文件 + 图片 + 汇总 Excel。<br>如目录已有旧文件，将自动跳过已存在项（增量更新）。</p>
        </div>
        <div style="margin-top:20px">
          <button class="btn btn-primary" id="btnStartNotes" disabled>开始导出小记</button>
        </div>
      </div>

      <!-- 知识库 tab -->
      <div class="tab-content card" id="tabBooks">
        <div class="form-row">
          <p class="section-title">输出目录</p>
          <div class="dir-row">
            <div class="dir-path" id="booksDirLabel">（未选择）</div>
            <button class="btn btn-outline" id="btnSelectBooksDir">选择目录</button>
          </div>
        </div>
        <div class="form-row" style="margin-top:16px">
          <div class="book-actions">
            <p class="section-title" style="flex:1;margin-bottom:0">选择知识库</p>
            <button class="btn btn-outline" id="btnLoadBooks" style="font-size:12px;padding:5px 12px">刷新列表</button>
            <button class="btn btn-outline" id="btnCheckAll" style="font-size:12px;padding:5px 12px">全选</button>
            <button class="btn btn-outline" id="btnUncheckAll" style="font-size:12px;padding:5px 12px">取消</button>
          </div>
          <div class="book-list" id="bookList">
            <div class="book-loading">点击「刷新列表」加载知识库</div>
          </div>
        </div>
        <div style="margin-top:16px">
          <button class="btn btn-primary" id="btnStartBooks" disabled>开始导出知识库</button>
        </div>
      </div>
    </div>

    <!-- ══ PROGRESS SCREEN ══ -->
    <div class="screen" id="screenProgress">
      <div class="card">
        <h2 id="progressTitle">正在导出...</h2>
        <div class="progress-pct" id="progressPct">0%</div>
        <div class="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
          <div class="progress-msg" id="progressMsg">准备中...</div>
        </div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>

    <!-- ══ DONE SCREEN ══ -->
    <div class="screen" id="screenDone">
      <div class="card">
        <div class="result-icon">✅</div>
        <h2 style="text-align:center;margin-bottom:4px" id="doneTitle">导出完成</h2>
        <div class="result-stats" id="doneStats"></div>
        <div class="result-actions" id="doneActions"></div>
        <div style="margin-top:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <button class="btn btn-outline" id="btnBackMain">返回主界面</button>
          <span class="reward-done" id="rewardDone">☕ 觉得好用？请我喝杯咖啡</span>
        </div>
      </div>
    </div>

  </div>
</div>
<!-- ══ 赞赏弹窗 ══ -->
<div class="reward-mask" id="rewardMask">
  <div class="reward-box">
    <button class="reward-close" id="rewardClose">×</button>
    <h3>请我喝杯咖啡 ☕</h3>
    <img src="../assets/reward-wechat.png" alt="微信赞赏码"/>
    <p>觉得这个工具帮你省了事？欢迎自愿赞赏 —— 所有功能始终免费 :)</p>
  </div>
</div>
<script>
  (function(){
    var mask=document.getElementById('rewardMask');
    function open(){mask.classList.add('show')}
    function close(){mask.classList.remove('show')}
    document.getElementById('rewardLink').onclick=open;
    document.getElementById('rewardDone').onclick=open;
    document.getElementById('rewardClose').onclick=close;
    mask.onclick=function(e){if(e.target===mask)close()};
    document.addEventListener('keydown',function(e){if(e.key==='Escape')close()});
  })();
</script>
<script src="app.js"></script>
</body>
</html>
